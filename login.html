<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — AgendaFácil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0f1e;
            overflow: hidden;
            position: relative;
        }

        /* ── Fundo animado ── */
        .bg-blobs {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.35;
            animation: float 12s ease-in-out infinite;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #1d4ed8, #3b82f6);
            top: -120px;
            left: -100px;
            animation-duration: 14s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, #0891b2, #06b6d4);
            bottom: -80px;
            right: -80px;
            animation-duration: 10s;
            animation-delay: -4s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #4f46e5, #7c3aed);
            top: 40%;
            left: 55%;
            animation-duration: 16s;
            animation-delay: -8s;
            opacity: 0.2;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            33% {
                transform: translateY(-30px) scale(1.05);
            }

            66% {
                transform: translateY(20px) scale(0.95);
            }
        }

        /* ── Grid de pontos ── */
        .bg-dots {
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: radial-gradient(rgba(255, 255, 255, .04) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* ── Card ── */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.97);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 440px;
            margin: 16px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.1),
                0 24px 80px rgba(0, 0, 0, 0.5),
                0 8px 24px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Logo ── */
        .logo-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            flex-shrink: 0;
            animation: pulse-logo 3s ease-in-out infinite;
        }

        @keyframes pulse-logo {

            0%,
            100% {
                box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
            }

            50% {
                box-shadow: 0 8px 32px rgba(59, 130, 246, 0.7);
            }
        }

        .logo-icon svg {
            width: 28px;
            height: 28px;
            color: #fff;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .logo-text p {
            font-size: 0.78rem;
            color: #64748b;
            font-weight: 500;
            margin-top: 1px;
        }

        /* ── Títulos ── */
        .card-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }

        .card-sub {
            font-size: 0.875rem;
            color: #64748b;
            margin-bottom: 28px;
        }

        /* ── Campos ── */
        .field {
            margin-bottom: 18px;
        }

        .field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
            letter-spacing: 0.2px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #9ca3af;
            pointer-events: none;
            transition: color 0.2s;
        }

        .input-wrap input {
            width: 100%;
            padding: 13px 14px 13px 42px;
            font-family: 'Inter', sans-serif;
            font-size: 0.9rem;
            color: #0f172a;
            background: #f8fafc;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.2s;
        }

        .input-wrap input:focus {
            border-color: #3b82f6;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        .input-wrap input:focus~.icon,
        .input-wrap:focus-within .icon {
            color: #3b82f6;
        }

        .input-wrap .toggle-pw {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: #9ca3af;
            padding: 4px;
            transition: color 0.2s;
        }

        .input-wrap .toggle-pw:hover {
            color: #3b82f6;
        }

        /* ── Lembrar / Esqueci ── */
        .row-opt {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 26px;
        }

        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #3b82f6;
            cursor: pointer;
        }

        .remember span {
            font-size: 0.82rem;
            color: #64748b;
        }

        .forgot {
            font-size: 0.82rem;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        /* ── Botão ── */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.2px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Spinner ── */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.4);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ── Alerta de erro ── */
        .alert {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 18px;
        }

        .alert.error {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            display: flex;
        }

        .alert.success {
            background: #f0fdf4;
            color: #15803d;
            border: 1px solid #bbf7d0;
            display: flex;
        }

        /* ── Divisor ── */
        .divider {
            text-align: center;
            color: #cbd5e1;
            font-size: 0.75rem;
            margin: 22px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e2e8f0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            font-size: 0.78rem;
            color: #94a3b8;
            margin-top: 28px;
        }

        .card-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
        }

        .card-footer a:hover {
            text-decoration: underline;
        }

        /* ── Badge de segurança ── */
        .security-badge {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 20px;
            color: #94a3b8;
            font-size: 0.72rem;
        }

        .security-badge svg {
            width: 12px;
            height: 12px;
        }
    </style>
</head>

<body>

    <!-- Fundo animado -->
    <div class="bg-dots"></div>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <!-- Card de Login -->
    <div class="card">

        <!-- Logo -->
        <div class="logo-wrap">
            <div class="logo-icon">
                <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
            </div>
            <div class="logo-text">
                <h1>AgendaFácil</h1>
                <p>Painel Administrativo</p>
            </div>
        </div>

        <!-- Título -->
        <p class="card-title">Bem-vindo de volta!</p>
        <p class="card-sub">Entre com suas credenciais para acessar o painel.</p>

        <!-- Alerta -->
        <div class="alert" id="alertMsg" role="alert">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            </svg>
            <span id="alertText"></span>
        </div>

        <!-- Formulário -->
        <form id="loginForm" novalidate>

            <!-- Email -->
            <div class="field">
                <label for="email">E-mail</label>
                <div class="input-wrap">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                    <input type="email" id="email" name="email" placeholder="seu@email.com.br" autocomplete="email"
                        required>
                </div>
            </div>

            <!-- Senha -->
            <div class="field">
                <label for="senha">Senha</label>
                <div class="input-wrap">
                    <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                            d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                    <input type="password" id="senha" name="senha" placeholder="••••••••"
                        autocomplete="current-password" required>
                    <button type="button" class="toggle-pw" onclick="toggleSenha()" title="Mostrar/ocultar senha">
                        <svg id="eyeIcon" width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                                d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Lembrar / Esqueci -->
            <div class="row-opt">
                <label class="remember">
                    <input type="checkbox" id="lembrar" checked>
                    <span>Lembrar por 7 dias</span>
                </label>
                <a href="#" class="forgot" onclick="esqueceuSenha(event)">Esqueceu a senha?</a>
            </div>

            <!-- Botão -->
            <button type="submit" class="btn-login" id="btnLogin">
                <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
                </svg>
                Entrar no Painel
            </button>

        </form>

        <!-- Badge de segurança -->
        <div class="security-badge">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
            </svg>
            Conexão segura · Dados criptografados
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <p>© 2026 AgendaFácil — Todos os direitos reservados.</p>
            <p style="margin-top:6px;">Precisa de acesso? <a href="mailto:suporte@agendafacil.com.br">Fale conosco</a>
            </p>
        </div>

    </div>

    <script>
        const TOKEN_KEY = 'agendafacil_token';

        // Se já está logado, redireciona
        if (localStorage.getItem(TOKEN_KEY) || sessionStorage.getItem(TOKEN_KEY)) {
            window.location.href = '/index.html';
        }

        // Toggle de senha
        function toggleSenha() {
            const input = document.getElementById('senha');
            const icon = document.getElementById('eyeIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908A3 3 0 1014.12 14.12M9.9 4.24A9.12 9.12 0 0112 4c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411M3 3l18 18"/>
                `;
            } else {
                input.type = 'password';
                icon.innerHTML = `
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8"
                        d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                `;
            }
        }

        // Mostrar alerta
        function showAlert(msg, tipo = 'error') {
            const box = document.getElementById('alertMsg');
            const text = document.getElementById('alertText');
            box.className = `alert ${tipo}`;
            text.textContent = msg;
            box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function hideAlert() {
            document.getElementById('alertMsg').className = 'alert';
        }

        // Esqueceu a senha
        function esqueceuSenha(e) {
            e.preventDefault();
            showAlert('Entre em contato com o suporte para redefinir sua senha: suporte@agendafacil.com.br', 'error');
        }

        // Submit do login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            const email = document.getElementById('email').value.trim();
            const senha = document.getElementById('senha').value;
            const lembrar = document.getElementById('lembrar').checked;

            if (!email || !senha) {
                showAlert('Preencha o e-mail e a senha.');
                return;
            }

            const btn = document.getElementById('btnLogin');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div> Verificando...';

            try {
                const resp = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha }),
                });

                const data = await resp.json();

                if (!resp.ok) {
                    showAlert(data.error || 'Erro ao fazer login.');
                    btn.disabled = false;
                    btn.innerHTML = `
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                        </svg>
                        Entrar no Painel
                    `;
                    return;
                }

                // Sucesso!
                const storage = lembrar ? localStorage : sessionStorage;
                storage.setItem(TOKEN_KEY, data.token);
                localStorage.setItem('agendafacil_clinica', JSON.stringify(data.clinica));

                showAlert('✅ Login realizado! Redirecionando...', 'success');

                btn.innerHTML = `
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                    </svg>
                    Acessando...
                `;

                setTimeout(() => { window.location.href = '/index.html'; }, 800);

            } catch (err) {
                console.error(err);
                showAlert('Não foi possível conectar ao servidor. Verifique sua conexão.');
                btn.disabled = false;
                btn.innerHTML = `
                    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/>
                    </svg>
                    Entrar no Painel
                `;
            }
        });

        // Foca no campo email ao carregar
        window.addEventListener('load', () => document.getElementById('email').focus());
    </script>

</body>

</html>
